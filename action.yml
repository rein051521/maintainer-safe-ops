name: "Maintainer Safe Ops"
description: "Check repositories for maintainer safety risks before publishing, merging, or releasing."
author: "Rein"

branding:
  icon: "shield"
  color: "green"

inputs:
  path:
    description: "Path to scan"
    required: false
    default: "."
  format:
    description: "Output format: human, json, or sarif"
    required: false
    default: "human"
  fail-on:
    description: "Minimum severity that fails the run: high, medium, low, or none"
    required: false
    default: "medium"

runs:
  using: "composite"
  steps:
    - name: Set up Python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
      with:
        python-version: "3.12"

    - name: Install maintainer-safe-ops
      shell: bash
      run: |
        python -m pip install --upgrade pip
        python -m pip install "${{ github.action_path }}"

    - name: Run maintainer-safe-ops
      shell: bash
      run: |
        maintainer-safe-ops "${{ inputs.path }}" --format "${{ inputs.format }}" --fail-on "${{ inputs.fail-on }}"
