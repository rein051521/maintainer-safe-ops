# Publish the package to PyPI using Trusted Publishing (OIDC) - no API tokens.
#
# One-time setup (done by the maintainer on PyPI, before the first run):
#   1. On https://pypi.org, add a "pending publisher" for project
#      `maintainer-safe-ops` pointing at:
#        owner:    rein051521
#        repo:     maintainer-safe-ops
#        workflow: publish-pypi.yml
#   2. Then trigger this workflow manually (Actions tab -> Publish to PyPI -> Run).
#
# Kept on workflow_dispatch only so it never runs (or fails) until intentionally invoked.

name: Publish to PyPI

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write # OIDC token for PyPI Trusted Publishing
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"

      - name: Build distributions
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
